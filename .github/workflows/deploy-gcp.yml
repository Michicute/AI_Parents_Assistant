name: Deploy GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-gcp-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure remote app directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            APP_DIR="${{ vars.GCE_APP_DIR || '/opt/c2-app' }}"
            sudo mkdir -p "$APP_DIR/src" "$APP_DIR/deploy/ec2/nginx/conf.d" /opt/c2-certs
            sudo chown -R "${{ vars.GCE_USERNAME || 'ubuntu' }}:${{ vars.GCE_USERNAME || 'ubuntu' }}" "$APP_DIR"

      - name: Copy source and deploy files to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          source: "src,deploy/ec2"
          target: ${{ vars.GCE_APP_DIR || '/opt/c2-app' }}
          rm: false

      - name: Normalize copied paths on GCE
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            APP_DIR="${{ vars.GCE_APP_DIR || '/opt/c2-app' }}"

            if [ -d "$APP_DIR/src/src" ]; then
              rm -rf "$APP_DIR/src.tmp"
              mv "$APP_DIR/src" "$APP_DIR/src.tmp"
              mv "$APP_DIR/src.tmp/src" "$APP_DIR/src"
              rm -rf "$APP_DIR/src.tmp"
            fi

            if [ -d "$APP_DIR/deploy/ec2/deploy/ec2" ]; then
              rm -rf "$APP_DIR/deploy/ec2.tmp"
              mv "$APP_DIR/deploy/ec2" "$APP_DIR/deploy/ec2.tmp"
              mv "$APP_DIR/deploy/ec2.tmp/deploy/ec2" "$APP_DIR/deploy/ec2"
              rm -rf "$APP_DIR/deploy/ec2.tmp"
            fi

            test -f "$APP_DIR/deploy/ec2/docker-compose.prod.yml"
            test -f "$APP_DIR/deploy/ec2/nginx/conf.d/default.conf.template"
            test -f "$APP_DIR/deploy/ec2/deploy-slot.sh"

      - name: Write production env file on GCE
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            APP_DIR="${{ vars.GCE_APP_DIR || '/opt/c2-app' }}"
            cat > "$APP_DIR/deploy/ec2/.env.prod" <<'EOF'
            APP_DOMAIN=${{ vars.APP_DOMAIN }}
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}
            FRONTEND_URL=${{ vars.FRONTEND_URL }}
            BACKEND_URL=${{ vars.BACKEND_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
            OPENAI_CHAT_MODEL=${{ vars.OPENAI_CHAT_MODEL }}
            OPENAI_INSIGHT_MODEL=${{ vars.OPENAI_INSIGHT_MODEL }}
            OPENAI_DRAFT_MODEL=${{ vars.OPENAI_DRAFT_MODEL }}
            OPENAI_VISION_MODEL=${{ vars.OPENAI_VISION_MODEL }}
            OPENAI_TIMEOUT_SECONDS=${{ vars.OPENAI_TIMEOUT_SECONDS || '45' }}
            OPENAI_MAX_RETRIES=${{ vars.OPENAI_MAX_RETRIES || '1' }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            AI_PROVIDER=${{ vars.AI_PROVIDER || 'openai' }}
            EMBEDDING_PROVIDER=${{ vars.EMBEDDING_PROVIDER || 'openai' }}
            RAG_AUTO_INGEST_ON_STARTUP=${{ vars.RAG_AUTO_INGEST_ON_STARTUP || 'false' }}
            APP_ENV=production
            APP_SECRET_KEY=${{ secrets.APP_SECRET_KEY }}
            APP_SESSION_EPOCH=${{ vars.APP_SESSION_EPOCH }}
            POSTGRES_DB=${{ vars.POSTGRES_DB || 'c2_app' }}
            POSTGRES_USER=${{ vars.POSTGRES_USER || 'postgres' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            INTEGRATION_SHARED_SECRET=${{ secrets.INTEGRATION_SHARED_SECRET }}
            ZALO_LINK_SESSION_TTL_MINUTES=${{ vars.ZALO_LINK_SESSION_TTL_MINUTES || '30' }}
            ZALO_SESSION_ENCRYPTION_KEY=${{ secrets.ZALO_SESSION_ENCRYPTION_KEY }}
            ZALO_ADAPTER=${{ vars.ZALO_ADAPTER || 'zca-js' }}
            ZALO_ACCOUNT_LABEL=${{ vars.ZALO_ACCOUNT_LABEL || 'default' }}
            ZALO_LANGUAGE=${{ vars.ZALO_LANGUAGE || 'vi' }}
            ZALO_BOT_CHAT_URL=${{ vars.ZALO_BOT_CHAT_URL }}
            ZALO_BOT_DISPLAY_NAME=${{ vars.ZALO_BOT_DISPLAY_NAME || 'Zalo Bot trung tam' }}
            ZALO_LINK_MESSAGE_PREFIX=${{ vars.ZALO_LINK_MESSAGE_PREFIX || 'LINK' }}
            ZALO_BOT_ENABLED_BLUE=false
            ZALO_BOT_ENABLED_GREEN=false
            SCHEDULED_ZALO_WORKER_ENABLED_BLUE=false
            SCHEDULED_ZALO_WORKER_ENABLED_GREEN=false
            EOF
            chmod 600 "$APP_DIR/deploy/ec2/.env.prod"

      - name: Ensure nginx origin certificate exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            APP_DOMAIN="${{ vars.APP_DOMAIN }}"
            sudo mkdir -p /opt/c2-certs
            if [ ! -s /opt/c2-certs/origin.crt ] || [ ! -s /opt/c2-certs/origin.key ]; then
              sudo openssl req -x509 -nodes -newkey rsa:2048 -days 30 \
                -keyout /opt/c2-certs/origin.key \
                -out /opt/c2-certs/origin.crt \
                -subj "/CN=${APP_DOMAIN:-localhost}" \
                -addext "subjectAltName=DNS:${APP_DOMAIN:-localhost},IP:127.0.0.1"
              sudo chmod 600 /opt/c2-certs/origin.key
              sudo chmod 644 /opt/c2-certs/origin.crt
            fi

      - name: Ensure VM swap space
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 4G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab >/dev/null
            elif ! swapon --show=NAME | grep -qx /swapfile; then
              sudo swapon /swapfile
            fi
            free -h

      - name: Deploy stack on GCE
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          command_timeout: 30m
          script: |
            APP_DIR="${{ vars.GCE_APP_DIR || '/opt/c2-app' }}"
            LOW_MEMORY_DEPLOY=true APP_DIR="$APP_DIR" sh "$APP_DIR/deploy/ec2/deploy-slot.sh" auto

      - name: Show container status
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCE_HOST || vars.GCE_HOST }}
          username: ${{ vars.GCE_USERNAME || 'ubuntu' }}
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          port: ${{ vars.GCE_PORT || 22 }}
          script: |
            APP_DIR="${{ vars.GCE_APP_DIR || '/opt/c2-app' }}"
            sudo docker compose -f "$APP_DIR/deploy/ec2/docker-compose.prod.yml" --env-file "$APP_DIR/deploy/ec2/.env.prod" ps
            sudo docker compose -f "$APP_DIR/deploy/ec2/docker-compose.prod.yml" --env-file "$APP_DIR/deploy/ec2/.env.prod" logs --tail=120 || true

name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: src/apps/backend/requirements.txt

      - run: pip install --no-cache-dir -r requirements.txt
      - run: pytest tests
      - run: ./run_eval.sh deterministic

  zalo-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/apps/zalo-bot-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/apps/zalo-bot-service/package-lock.json

      - run: npm ci
      - run: npm run build

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/infra/terraform/aws
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
